<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>clipped.page settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>clipped<span class="dim">.page</span></h1>
      <p class="dim">When you click the <svg class="scissors" width="15" height="15" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="23" r="3.5"/><circle cx="23" cy="23" r="3.5"/><path d="M20.5 20.5 L18.3 18.3"/><path d="M13.7 13.7 L5 5"/><path d="M11.5 20.5 L27 5"/></svg> button on a post:</p>
      <form id="opts">
        <label><input type="radio" name="clipAction" value="open" /> Open the clipped link in a new tab</label>
        <label><input type="radio" name="clipAction" value="copy" /> Copy the clipped link to the clipboard</label>
        <label><input type="radio" name="clipAction" value="copy+open" /> Copy the link and open it</label>
        <label><input type="radio" name="clipAction" value="share" /> Share the link via the system share sheet</label>
        <label><input type="radio" name="clipAction" value="copy-md" /> Copy the post as Markdown</label>
      </form>
      <p id="status" class="status"></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
